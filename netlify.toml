[build]
  publish = "frontend"

[[redirects]]
  from = "/api/*"
  to = "https://YOUR-RENDER-BACKEND.onrender.com/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: blob:; media-src 'self' blob: https://*.cloudflarestream.com; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https: wss: https://*.cloudflarestream.com https://stun.cloudflare.com;"
    Permissions-Policy = "camera=(self), microphone=(self)"
